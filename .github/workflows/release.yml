name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint extension
        run: npm run lint

      - name: Build Firefox zip
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: web-ext-artifacts/*.zip

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VERSION" '
            /^#### / {
              if (found) exit
              if ($0 ~ "^#### " ver "([[:space:]]|$)") { found = 1; next }
              next
            }
            /^\*\*/ { if (found) exit; next }
            found { print }
          ' docs/changelog.md | awk 'NF{p=1} p' | tac | awk 'NF{p=1} p' | tac)
          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for version $VERSION" >&2
            exit 1
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: web-ext-artifacts/*.zip
          body: ${{ steps.changelog.outputs.notes }}
